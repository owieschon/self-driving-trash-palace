name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      CI: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Lint GitHub Actions workflows
        env:
          ACTIONLINT_ARCHIVE_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          ACTIONLINT_VERSION: 1.7.12
        run: |
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --silent --show-error --location \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            --output "$archive"
          printf '%s  %s\n' "$ACTIONLINT_ARCHIVE_SHA256" "$archive" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -color

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version

      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting, lint, types, and tests
        run: pnpm check

      - name: Build packages
        run: pnpm build

  postgres-integration:
    name: PostgreSQL 17 integration
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      CI: 'true'
      TEST_DATABASE_URL: postgres://trash_palace_ci:trash_palace_ci_only@127.0.0.1:55432/trash_palace_ci
    services:
      postgres:
        image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: trash_palace_ci
          POSTGRES_PASSWORD: trash_palace_ci_only
          POSTGRES_USER: trash_palace_ci
        ports:
          - 127.0.0.1:55432:5432
        options: >-
          --health-cmd "pg_isready --username=trash_palace_ci --dbname=trash_palace_ci"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
          --health-start-period 5s

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version

      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run PostgreSQL integration suites without skips
        run: |
          report="$RUNNER_TEMP/postgres-integration.json"
          pnpm exec vitest run packages/db/src packages/integration/src \
            --reporter=default \
            --reporter=json \
            --outputFile.json="$report"
          node --input-type=module - "$report" <<'NODE'
          import { readFileSync, readdirSync } from 'node:fs'
          import { join, relative } from 'node:path'

          const reportPath = process.argv[2]
          const report = JSON.parse(readFileSync(reportPath, 'utf8'))
          const collectTests = (directory) =>
            readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const path = join(directory, entry.name)
              if (entry.isDirectory()) return collectTests(path)
              return entry.isFile() && entry.name.endsWith('.test.ts') ? [path] : []
            })
          const normalize = (path) => path.replaceAll('\\', '/')
          const expected = new Set(
            ['packages/db/src', 'packages/integration/src']
              .flatMap(collectTests)
              .map((path) => normalize(path)),
          )
          const executed = new Set(
            report.testResults.map((suite) => normalize(relative(process.cwd(), suite.name))),
          )
          const missing = [...expected].filter((path) => !executed.has(path))
          const skipped = report.testResults.flatMap((suite) =>
            suite.assertionResults
              .filter((test) => ['skipped', 'pending', 'todo', 'disabled'].includes(test.status))
              .map((test) => `${normalize(relative(process.cwd(), suite.name))}: ${test.fullName}`),
          )

          if (
            !process.env.TEST_DATABASE_URL ||
            report.numTotalTests === 0 ||
            report.numPendingTests !== 0 ||
            report.numTodoTests !== 0 ||
            missing.length !== 0 ||
            skipped.length !== 0
          ) {
            console.error(
              JSON.stringify(
                {
                  error: 'PostgreSQL integration coverage was incomplete',
                  missingSuites: missing,
                  skippedTests: skipped,
                  totalTests: report.numTotalTests,
                  pendingTests: report.numPendingTests,
                  todoTests: report.numTodoTests,
                },
                null,
                2,
              ),
            )
            process.exit(1)
          }

          console.log(
            `Verified ${report.numPassedTests} PostgreSQL tests across ${executed.size} suites with no skips.`,
          )
          NODE

  public-artifact-reproducibility:
    name: Public artifact reproducibility
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      CI: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version

      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Warm the frozen dependency store
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify the warm install left a clean checkout
        run: |
          dirty="$(git status --porcelain=v1 --untracked-files=all)"
          if [ -n "$dirty" ]; then
            printf '%s\n' "$dirty"
            echo '::error::The dependency warm changed tracked files or created untracked files.'
            exit 1
          fi

      - name: Compare two clean public-reference builds
        run: pnpm references:verify-reproducible

  credential-free-quest:
    name: Credential-free composed Quest
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CI: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version

      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start a clean composed stack
        run: |
          pnpm local:prepare
          pnpm local:reset
          pnpm local:up

      - name: Run credential-free composed Quest
        run: |
          rm -f -- evals/reports/credential-free-quest.json
          pnpm quest:verify

      - name: Confirm the validated receipt is safe to retain
        id: validate-quest-receipt
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto'
          import { readFileSync } from 'node:fs'

          const path = 'evals/reports/credential-free-quest.json'
          const bytes = readFileSync(path)
          const receipt = JSON.parse(bytes.toString('utf8'))
          const exactKeys = (value, expected, label) => {
            if (typeof value !== 'object' || value === null || Array.isArray(value)) {
              throw new Error(`${label} must be an object`)
            }
            const actual = Object.keys(value).sort()
            const wanted = [...expected].sort()
            if (JSON.stringify(actual) !== JSON.stringify(wanted)) {
              throw new Error(`${label} contains an unexpected field set`)
            }
          }
          const sha256 = (value) => /^[a-f0-9]{64}$/.test(value)
          const requiredLifecycleEvents = [
            'mission created',
            'plan proposed',
            'plan simulated',
            'plan approved',
            'operation requested',
            'operation outcome unknown',
            'operation reconciled',
            'routine activated',
            'execution observed',
            'execution verified',
            'mission completed',
          ]

          exactKeys(
            receipt,
            [
              'schemaVersion',
              'fixture',
              'proofLevel',
              'services',
              'boundaries',
              'browserBoundary',
              'transportParity',
              'lifecycle',
              'recovery',
              'ledger',
              'evidence',
            ],
            'Quest receipt',
          )
          exactKeys(
            receipt.recovery,
            [
              'gatewayAndWorkerRestarted',
              'pendingApprovalSurvivedRestart',
              'fixtureClockArmedAfterRestart',
              'applicationCommitThenResponseLostObserved',
              'gatewayLostAcknowledgementObserved',
              'logicalOperationCount',
            ],
            'Quest recovery receipt',
          )
          exactKeys(
            receipt.evidence,
            [
              'schemaValidated',
              'missionScoped',
              'allOutboxDeliveriesAcknowledged',
              'requiredLifecycleEventsPresent',
              'outboxDeliveryCount',
              'eventCount',
              'eventNames',
              'eventSetHash',
            ],
            'Quest evidence receipt',
          )
          if (
            receipt.schemaVersion !== 'credential-free-quest-receipt@2' ||
            receipt.fixture !== 'night-shift-homecoming@1' ||
            receipt.proofLevel !== 'live_local_network_simulation' ||
            receipt.boundaries?.credentialFree !== true ||
            receipt.boundaries?.externalIntegrationsConfigured !== false ||
            receipt.boundaries?.runtimeEgressIsolation !== 'not_enforced' ||
            receipt.boundaries?.modelBackedBehavior !== 'blocked' ||
            receipt.boundaries?.posthogIngestion !== 'blocked' ||
            receipt.lifecycle?.terminalState !== 'succeeded' ||
            receipt.lifecycle?.verification !== 'passed' ||
            receipt.recovery?.gatewayAndWorkerRestarted !== true ||
            receipt.recovery?.pendingApprovalSurvivedRestart !== true ||
            receipt.recovery?.fixtureClockArmedAfterRestart !== true ||
            receipt.recovery?.applicationCommitThenResponseLostObserved !== true ||
            receipt.recovery?.gatewayLostAcknowledgementObserved !== true ||
            receipt.recovery?.logicalOperationCount !== 1 ||
            receipt.ledger?.applicationUnknownAttemptCount !== 1 ||
            receipt.ledger?.applicationResponseLossEvidenceCount !== 1 ||
            receipt.ledger?.activationUnknownReceiptCount !== 1 ||
            receipt.ledger?.applicationAttemptReceiptBound !== true ||
            receipt.ledger?.committedApplicationReconciliationCount !== 1 ||
            receipt.ledger?.applicationReconciliationOrderingValid !== true ||
            receipt.evidence?.schemaValidated !== true ||
            receipt.evidence?.missionScoped !== true ||
            receipt.evidence?.allOutboxDeliveriesAcknowledged !== true ||
            receipt.evidence?.requiredLifecycleEventsPresent !== true ||
            !Array.isArray(receipt.evidence?.eventNames) ||
            !requiredLifecycleEvents.every((event) => receipt.evidence.eventNames.includes(event)) ||
            !Number.isInteger(receipt.evidence?.outboxDeliveryCount) ||
            receipt.evidence.outboxDeliveryCount < 1 ||
            !Number.isInteger(receipt.evidence?.eventCount) ||
            receipt.evidence.eventCount < 1 ||
            !sha256(receipt.evidence?.eventSetHash) ||
            !sha256(receipt.transportParity?.resultDataHash)
          ) {
            throw new Error('Quest receipt does not satisfy the retained evidence boundary')
          }

          console.log(`Retained Quest receipt SHA-256: ${createHash('sha256').update(bytes).digest('hex')}`)
          NODE
          pnpm publication:check
          echo 'valid=true' >> "$GITHUB_OUTPUT"

      - name: Upload validated Quest receipt
        if: steps.validate-quest-receipt.outputs.valid == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: credential-free-quest-${{ github.run_id }}-${{ github.run_attempt }}
          path: evals/reports/credential-free-quest.json
          if-no-files-found: error
          retention-days: 3
          compression-level: 9
          include-hidden-files: false

      - name: Print bounded redacted stack diagnostics
        if: always()
        run: |
          set +e
          environment=artifacts/private/local-stack.env
          if [ ! -f "$environment" ]; then
            echo 'The local stack environment was not created.'
            exit 0
          fi
          if docker compose version >/dev/null 2>&1; then
            compose=(docker compose)
          elif command -v docker-compose >/dev/null 2>&1; then
            compose=(docker-compose)
          else
            echo 'Docker Compose is unavailable.'
            exit 0
          fi

          echo 'Stack state:'
          timeout 15s "${compose[@]}" --env-file "$environment" ps \
            --format 'table {{.Service}}\t{{.State}}\t{{.Status}}' 2>&1 \
            | awk '{ print substr($0, 1, 500) }' \
            | tail -n 40

          for service in postgres bootstrap web gateway-simulator worker; do
            echo "::group::Redacted ${service} tail"
            timeout 15s "${compose[@]}" --env-file "$environment" logs \
              --no-color --tail 80 "$service" 2>&1 \
              | sed -E \
                -e 's/(Bearer )[A-Za-z0-9._~+\/=:-]+/\1[REDACTED]/g' \
                -e 's/(tpc_|sk-|phx_|pha_)[A-Za-z0-9_-]{12,}/[REDACTED]/g' \
                -e 's/(local_|pg_)[A-Za-z0-9_-]{20,}/[REDACTED]/g' \
                -e 's#(postgres(ql)?://)[^/@[:space:]]+@#\1[REDACTED]@#g' \
                -e 's/(__Host-trash_palace_session=)[^;[:space:]]+/\1[REDACTED]/g' \
                -e 's/((SESSION_SIGNING_KEY|TOOL_INVOCATION_SCOPE_KEY|GATEWAY_CALLBACK_SIGNING_KEY|IDENTITY_TELEMETRY_SIGNING_KEY|TRASH_PALACE_EVIDENCE_ALIAS_KEY|TRASH_PALACE_POSTGRES_PASSWORD)[=:])[[:graph:]]+/\1[REDACTED]/g' \
              | awk '{ print substr($0, 1, 500) }' \
              | tail -n 80
            echo '::endgroup::'
          done
          exit 0

      - name: Remove the composed stack and private environment
        if: always()
        run: |
          cleanup_status=0
          if [ -f artifacts/private/local-stack.env ]; then
            pnpm local:reset || cleanup_status=$?
          fi
          rm -f -- artifacts/private/local-stack.env
          if [ "$cleanup_status" -ne 0 ]; then
            echo '::error::The composed Quest stack or its named volumes could not be removed.'
            exit "$cleanup_status"
          fi

  endor:
    name: Endor Labs
    needs: [quality, postgres-integration]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      security-events: write
    env:
      ENDOR_JS_ENABLE_TSSERVER: 'false'
      ENDOR_JS_PACKAGE_MANAGER: pnpm
      ENDOR_JS_USE_ROOT_DIR_LOCK_FILE: 'true'

    steps:
      - name: Verify Endor configuration
        env:
          ENDOR_NAMESPACE: ${{ vars.ENDOR_NAMESPACE }}
        run: |
          if [ -z "$ENDOR_NAMESPACE" ]; then
            echo "::error::Set the ENDOR_NAMESPACE repository variable and authorize owieschon/trash-palace for GitHub Action OIDC in Endor Labs."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version-file: .node-version

      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate

      - name: Scan pull request with Endor Labs
        if: github.event_name == 'pull_request'
        uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946 # v1.1.12
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          enable_github_action_token: true
          endorctl_version: v1.7.1060
          endorctl_checksum: 663040c94d1c671fb1eac4f2c94a4a06ce0154866d155df6679a0f8bab1c06bc
          pr: true
          pr_baseline: main
          pr_incremental: true
          scan_dependencies: true
          scan_git_logs: true
          scan_github_actions: true
          scan_secrets: true
          scan_sast: true
          scan_ai_models: true
          disable_code_snippet_storage: true
          scan_summary_output_type: summary
          sarif_file: endor.sarif
          export_scan_result_artifact: false

      - name: Scan monitored revision with Endor Labs
        if: github.event_name != 'pull_request'
        uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946 # v1.1.12
        with:
          namespace: ${{ vars.ENDOR_NAMESPACE }}
          enable_github_action_token: true
          endorctl_version: v1.7.1060
          endorctl_checksum: 663040c94d1c671fb1eac4f2c94a4a06ce0154866d155df6679a0f8bab1c06bc
          pr: false
          scan_dependencies: true
          scan_git_logs: true
          scan_github_actions: true
          scan_secrets: true
          scan_sast: true
          scan_ai_models: true
          disable_code_snippet_storage: true
          scan_summary_output_type: summary
          sarif_file: endor.sarif
          export_scan_result_artifact: false

      - name: Upload Endor findings to GitHub code scanning
        if: ${{ always() && hashFiles('endor.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: endor.sarif
          category: endor-labs
