name: self-driving-trash-palace

x-app-service: &app-service
  image: self-driving-trash-palace:local
  init: true
  user: node
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  networks:
    - trash-palace-private

x-database-url: &database-url >-
  postgresql://trash_palace:${TRASH_PALACE_POSTGRES_PASSWORD:?Run pnpm local:prepare}@postgres:5432/trash_palace

services:
  postgres:
    image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    init: true
    user: postgres
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      POSTGRES_DB: trash_palace
      POSTGRES_PASSWORD: ${TRASH_PALACE_POSTGRES_PASSWORD:?Run pnpm local:prepare}
      POSTGRES_USER: trash_palace
    healthcheck:
      test: [CMD-SHELL, 'pg_isready -h 127.0.0.1 -U trash_palace -d trash_palace']
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    ports:
      - '127.0.0.1:${TRASH_PALACE_POSTGRES_PORT:-55432}:5432'
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - trash-palace-postgres:/var/lib/postgresql/data
    networks:
      - trash-palace-private

  bootstrap:
    <<: *app-service
    build:
      context: .
      dockerfile: Dockerfile
    command: [node, --import, tsx, apps/worker/src/bootstrap-main.ts]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: *database-url
      TRASH_PALACE_APP_VERSION: 0.0.0
      TRASH_PALACE_BOOTSTRAP_PROFILE: local-fixture
      TRASH_PALACE_REPOSITORY_ROOT: /workspace
    restart: 'no'

  web:
    <<: *app-service
    command: [pnpm, --filter, '@trash-palace/web', start, --hostname, 0.0.0.0, --port, '3000']
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    environment:
      # The built bundle still uses development identity mode for loopback-only fixture login.
      NODE_ENV: development
      DATABASE_URL: *database-url
      SESSION_SIGNING_KEY: ${SESSION_SIGNING_KEY:?Run pnpm local:prepare}
      TOOL_INVOCATION_SCOPE_KEY: ${TOOL_INVOCATION_SCOPE_KEY:?Run pnpm local:prepare}
      GATEWAY_CALLBACK_SIGNING_KEY: ${GATEWAY_CALLBACK_SIGNING_KEY:?Run pnpm local:prepare}
      GATEWAY_CALLBACK_SIGNING_KEY_ID: gwk_local_gateway_2026
      IDENTITY_TELEMETRY_SIGNING_KEY: ${IDENTITY_TELEMETRY_SIGNING_KEY:?Run pnpm local:prepare}
      IDENTITY_TELEMETRY_SIGNING_KEY_ID: itk_local_identity
      IDENTITY_TELEMETRY_PRINCIPAL_ID: itp_local_identity
      TRASH_PALACE_LOCAL_ORGANIZATION_ID: org_rocky_roost
      TRASH_PALACE_LOCAL_PALACE_ID: pal_sacred_dumpster
      TRASH_PALACE_REPOSITORY_ROOT: /workspace
      TRASH_PALACE_APP_VERSION: 0.0.0
      TRASH_PALACE_APPLICATION_TRANSPORT_FAULT: application_commit_then_response_lost
      TRASH_PALACE_APPLICATION_TRANSPORT_FAULT_ORGANIZATION_ID: org_rocky_roost
      TRASH_PALACE_CLOCK_MODE: ${TRASH_PALACE_CLOCK_MODE:?Run pnpm local:prepare}
      TRASH_PALACE_ENVIRONMENT: ${TRASH_PALACE_RUNTIME_ENVIRONMENT:-local}
      TRASH_PALACE_EVIDENCE_ALIAS_KEY: ${TRASH_PALACE_EVIDENCE_ALIAS_KEY:?Run pnpm local:prepare}
      TRASH_PALACE_EVIDENCE_ORIGIN: ${TRASH_PALACE_RUNTIME_EVIDENCE_ORIGIN:-fixture}
      TRASH_PALACE_EVIDENCE_SINK_PATH: /var/lib/trash-palace/evidence/caretaker.jsonl
      TRASH_PALACE_FIXTURE_REAL_START_AT: ${TRASH_PALACE_FIXTURE_REAL_START_AT:?Run pnpm local:prepare}
      TRASH_PALACE_LAB_MODE: 'true'
      TRASH_PALACE_ALLOWED_ORIGIN: http://127.0.0.1:${TRASH_PALACE_WEB_PORT:-3300}
      TRASH_PALACE_DEV_SESSION_ENABLED: 'true'
      TRASH_PALACE_DEV_ORGANIZATION_ID: org_rocky_roost
      TRASH_PALACE_DEV_USER_ID: usr_rocky_founder
      TRASH_PALACE_DEV_MEMBERSHIP_ID: mem_rocky_owner
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:3000/api/v1/ready').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 20s
    ports:
      - '127.0.0.1:${TRASH_PALACE_WEB_PORT:-3300}:3000'
    restart: unless-stopped
    stop_grace_period: 20s
    volumes:
      - trash-palace-evidence:/var/lib/trash-palace/evidence

  gateway-simulator:
    <<: *app-service
    command: [node, --import, tsx, apps/gateway-simulator/src/main.ts]
    depends_on:
      web:
        condition: service_healthy
    environment:
      GATEWAY_SIMULATOR_HOST: 0.0.0.0
      GATEWAY_SIMULATOR_PORT: '4319'
      GATEWAY_SIMULATOR_LAB_MODE: 'true'
      GATEWAY_SIMULATOR_FAULT_PROFILE: lost_ack
      GATEWAY_CALLBACK_SIGNING_KEY: ${GATEWAY_CALLBACK_SIGNING_KEY:?Run pnpm local:prepare}
      GATEWAY_CALLBACK_SIGNING_KEY_ID: gwk_local_gateway_2026
      GATEWAY_CALLBACK_REQUEST_TIMEOUT_MS: '10000'
      IDENTITY_TELEMETRY_SIGNING_KEY: ${IDENTITY_TELEMETRY_SIGNING_KEY:?Run pnpm local:prepare}
      IDENTITY_TELEMETRY_SIGNING_KEY_ID: itk_local_identity
      IDENTITY_TELEMETRY_REQUEST_TIMEOUT_MS: '10000'
      TRASH_PALACE_FIXTURE_REAL_START_AT: ${TRASH_PALACE_FIXTURE_REAL_START_AT:?Run pnpm local:prepare}
      GATEWAY_SHUTDOWN_TIMEOUT_MS: '45000'
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:4319/readyz').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    ports:
      - '127.0.0.1:${TRASH_PALACE_GATEWAY_PORT:-4319}:4319'
    restart: unless-stopped
    stop_grace_period: 15s

  worker:
    <<: *app-service
    command: [node, --import, tsx, apps/worker/src/main.ts]
    depends_on:
      gateway-simulator:
        condition: service_healthy
    environment:
      DATABASE_URL: *database-url
      TOOL_INVOCATION_SCOPE_KEY: ${TOOL_INVOCATION_SCOPE_KEY:?Run pnpm local:prepare}
      TRASH_PALACE_APP_VERSION: 0.0.0
      TRASH_PALACE_APPLICATION_TRANSPORT_FAULT: application_commit_then_response_lost
      TRASH_PALACE_APPLICATION_TRANSPORT_FAULT_ORGANIZATION_ID: org_rocky_roost
      TRASH_PALACE_CLOCK_MODE: ${TRASH_PALACE_CLOCK_MODE:?Run pnpm local:prepare}
      TRASH_PALACE_ENVIRONMENT: ${TRASH_PALACE_RUNTIME_ENVIRONMENT:-local}
      TRASH_PALACE_EVIDENCE_ALIAS_KEY: ${TRASH_PALACE_EVIDENCE_ALIAS_KEY:?Run pnpm local:prepare}
      TRASH_PALACE_EVIDENCE_ORIGIN: ${TRASH_PALACE_RUNTIME_EVIDENCE_ORIGIN:-fixture}
      TRASH_PALACE_EVIDENCE_SINK_PATH: /var/lib/trash-palace/evidence/caretaker.jsonl
      TRASH_PALACE_FIXTURE_REAL_START_AT: ${TRASH_PALACE_FIXTURE_REAL_START_AT:?Run pnpm local:prepare}
      TRASH_PALACE_LAB_MODE: 'true'
      TRASH_PALACE_REPOSITORY_ROOT: /workspace
      TRASH_PALACE_WORKER_HEALTH_HOST: 0.0.0.0
      TRASH_PALACE_WORKER_HEALTH_PORT: '4320'
      TRASH_PALACE_WORKER_ID: caretaker-local-1
      TRASH_PALACE_WORKER_SERVICE_ACTOR_ID: usr_caretaker_service
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:4320/readyz').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 15s
    ports:
      - '127.0.0.1:${TRASH_PALACE_WORKER_HEALTH_PORT:-4320}:4320'
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - trash-palace-evidence:/var/lib/trash-palace/evidence

networks:
  trash-palace-private:
    driver: bridge

volumes:
  trash-palace-evidence:
  trash-palace-postgres:
